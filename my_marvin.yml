jenkins:
  systemMessage: "Welcome to the Chocolatine-Powered Marvin Jenkins Instance."

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "chocolateen"
          name: "Hugo"
          password: "${USER_CHOCOLATEEN_PASSWORD}"
        - id: "vaugie_g"
          name: "Garance"
          password: "${USER_VAUGIE_G_PASSWORD}"
        - id: "i_dont_know"
          name: "Jeremy"
          password: "${USER_I_DONT_KNOW_PASSWORD}"
        - id: "nasso"
          name: "Nassim"
          password: "${USER_NASSO_PASSWORD}"

  authorizationStrategy:
    roleBased:
      roles:
        global:
          - name: "admin"
            description: "Marvin master"
            pattern: ".*"
            permissions:
              - "Overall/Administer"
            entries:
              - user: "chocolateen"

          - name: "ape"
            description: "Pedagogical team member"
            pattern: ".*"
            permissions:
              - "Overall/Read"
              - "Job/Read"
              - "Job/Build"
              - "Job/Workspace"
            entries:
              - user: "i_dont_know"

          - name: "gorilla"
            description: "Group Obsessively Researching Innovation Linked to Learning and Accomplishment"
            pattern: ".*"
            permissions:
              - "Overall/Read"
              - "Job/Read"
              - "Job/Build"
              - "Job/Workspace"
              - "Job/Create"
              - "Job/Configure"
              - "Job/Delete"
              - "Job/Move"
              - "Job/Cancel"
            entries:
              - user: "vaugie_g"

          - name: "assist"
            description: "Assistant"
            pattern: ".*"
            permissions:
              - "Overall/Read"
              - "Job/Read"
              - "Job/Workspace"
            entries:
              - user: "nasso"

jobs:
  - script: |
      // Dossier Tools
      folder('Tools') {
        description('Folder for miscellaneous tools.')
      }

      // Job Tools/clone-repository
      freeStyleJob('Tools/clone-repository') {
        description('Job to clone a Git repository')

        parameters {
          stringParam('GIT_REPOSITORY_URL', '', 'Git URL of the repository to clone')
        }

        wrappers {
          preBuildCleanup()
        }

        steps {
          shell('git clone "$GIT_REPOSITORY_URL"')
        }
      }

      // Job Tools/SEED
      freeStyleJob('Tools/SEED') {
        description('Job to create dynamic jobs from Job DSL')

        parameters {
          stringParam('GITHUB_NAME', '', '"GitHub repository owner/repo_name" description (e.g.: "EpitechIT31000/chocolatine")')
          stringParam('DISPLAY_NAME', '', 'Display name for the job')
        }

        steps {
          dsl {
            external("job_dsl.groovy")
          }
        }
      }

unclassified:
  location:
    url: "http://localhost:8080/"
